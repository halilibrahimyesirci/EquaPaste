<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280"
     font-family="system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#1C2029"/>
      <stop offset="1" stop-color="#13161D"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.18" r="0.6">
      <stop offset="0" stop-color="#5B6CFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#5B6CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="serif" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F8FA"/>
      <stop offset="1" stop-color="#D7DBE4"/>
    </linearGradient>
  </defs>

  <rect width="440" height="280" fill="url(#bg)"/>
  <rect width="440" height="280" fill="url(#glow)"/>

  <!-- brand -->
  <g transform="translate(28,26)">
    <rect width="42" height="42" rx="11" fill="#E2E5EC"/>
    <text x="21" y="23" text-anchor="middle" dominant-baseline="central"
          font-size="26" font-weight="700" fill="#15181F">&#931;</text>
    <text x="54" y="20" font-size="24" font-weight="700" fill="#F7F8FA" letter-spacing="-0.4">EquaPaste</text>
    <text x="55" y="40" font-size="14" font-weight="500" fill="#9AA1B1">Paste math as real equations</text>
  </g>

  <!-- equation card -->
  <g transform="translate(28,100)">
    <rect width="384" height="116" rx="16" fill="#222632" stroke="#2A2F3B" stroke-width="1.5"/>
    <text x="28" y="74" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="46" fill="url(#serif)">E = mc<tspan font-size="28" dy="-16">2</tspan></text>
    <g transform="translate(214,40)">
      <rect width="146" height="40" rx="20" fill="#F7F8FA"/>
      <text x="20" y="25" font-size="17" font-weight="700" fill="#15181F">&#931;</text>
      <text x="40" y="25" font-size="14" font-weight="600" fill="#15181F">Copy to Word</text>
    </g>
  </g>

  <!-- trust line -->
  <g transform="translate(28,244)">
    <circle cx="6" cy="8" r="6" fill="#34D08A"/>
    <text x="22" y="13" font-size="14" font-weight="600" fill="#9AA1B1">100% local &#183; no tracking &#183; open source</text>
  </g>
</svg>
